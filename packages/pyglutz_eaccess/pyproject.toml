[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pyglutz-eaccess"
version = "0.1.0"
description = "Async client for the Glutz eAccess JSON-RPC API."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
authors = [{ name = "Michele Greco" }]
keywords = ["glutz", "eaccess", "access-control", "home-assistant"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Home Automation",
]
dependencies = ["aiohttp>=3.9"]

[project.urls]
Homepage = "https://github.com/miitchpls/hass-glutz-eaccess"
Issues = "https://github.com/miitchpls/hass-glutz-eaccess/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/pyglutz_eaccess"]

[tool.hatch.build.targets.sdist]
include = ["src/", "README.md", "LICENSE", "CHANGELOG.md"]
